name: devops-pipeline
on:
  push:
    branches: [ main ]
    pull_request:
        branches: [ main ]
jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v5

        - name: Set Up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '20'

        - name: Install dependencies
          run: npm install

        - name: Run tests
          run: npm run test
